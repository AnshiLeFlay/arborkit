services:
  postgres:
    image: pgvector/pgvector:0.8.5-pg17-bookworm
    environment:
      POSTGRES_USER: arborkit
      POSTGRES_PASSWORD: arborkit
      POSTGRES_DB: arborkit
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arborkit"]
      interval: 2s
      timeout: 3s
      retries: 20
  qdrant:
    image: qdrant/qdrant:v1.18.2
    ports:
      - "6339:6333"
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/127.0.0.1/6333"]
      interval: 2s
      timeout: 3s
      retries: 20
