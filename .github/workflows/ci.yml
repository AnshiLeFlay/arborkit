name: ci
on:
  push: { branches: [main] }
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:0.8.5-pg17-bookworm
        env:
          POSTGRES_USER: arborkit
          POSTGRES_PASSWORD: arborkit
          POSTGRES_DB: arborkit
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U arborkit"
          --health-interval 2s --health-timeout 3s --health-retries 20
      qdrant:
        image: qdrant/qdrant:v1.18.2
        ports: ["6333:6333"]
    strategy:
      matrix: { node: [22, 24] }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ matrix.node }}" }
      - run: npm ci
      - name: Configure integration services
        run: |
          echo "ARBORKIT_TEST_POSTGRES_URL=postgresql://arborkit:arborkit@127.0.0.1:5432/arborkit" >> "$GITHUB_ENV"
          echo "ARBORKIT_TEST_QDRANT_URL=http://127.0.0.1:6333" >> "$GITHUB_ENV"
      - run: npm run test:all
      - run: npm run typecheck:all
      - run: npm run build:all
      - run: npm run example:all
      - run: npm run docs:api
      - run: npm run pack:smoke
